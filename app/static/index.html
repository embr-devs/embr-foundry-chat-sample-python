<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Embr × Foundry chat</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #131a33;
        --border: #27305a;
        --text: #e7ecff;
        --muted: #8892c4;
        --accent: #7aa2ff;
        --user: #1e3a8a;
        --assistant: #1f2947;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(180deg, #070a1a 0%, var(--bg) 100%);
        color: var(--text);
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      header h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: 0.2px; }
      .conn {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 12px;
        color: var(--muted);
        background: var(--panel);
        border: 1px solid var(--border);
        padding: 6px 12px;
        border-radius: 999px;
      }
      .conn .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #6b7290;
        box-shadow: 0 0 0 0 rgba(0,0,0,0);
      }
      .conn.ok .dot { background: #3ddc97; box-shadow: 0 0 8px rgba(61,220,151,0.5); }
      .conn.err .dot { background: #ff6b6b; }
      .conn .sep { opacity: 0.4; }
      .conn .label { color: var(--muted); }
      .conn .value { color: var(--text); font-weight: 500; }
      .header-right { display: flex; align-items: center; gap: 10px; }
      button.ghost {
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      button.ghost:hover { border-color: var(--accent); color: var(--accent); }
      button.ghost svg { width: 14px; height: 14px; }
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: 820px;
        width: 100%;
        margin: 0 auto;
        padding: 24px;
        gap: 16px;
        overflow: hidden;
      }
      #log {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding-right: 4px;
      }
      .row {
        display: flex;
        gap: 10px;
        max-width: 85%;
        align-items: flex-start;
      }
      .row.user { align-self: flex-end; flex-direction: row-reverse; }
      .row.assistant { align-self: flex-start; }
      .avatar {
        width: 32px;
        height: 32px;
        flex: 0 0 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
      }
      .avatar svg { width: 18px; height: 18px; }
      .row.user .avatar { background: var(--user); }
      .row.assistant .avatar { background: linear-gradient(135deg, #4a63c8, #7aa2ff); color: #0b1020; border-color: transparent; }
      .msg {
        padding: 12px 16px;
        border-radius: 14px;
        line-height: 1.5;
        word-wrap: break-word;
        border: 1px solid var(--border);
        flex: 1;
        min-width: 0;
      }
      .msg.user { background: var(--user); white-space: pre-wrap; }
      .msg.assistant { background: var(--assistant); }
      .msg.system { align-self: center; background: transparent; color: var(--muted); font-size: 12px; border: 0; }
      .msg.assistant p { margin: 0 0 8px 0; }
      .msg.assistant p:last-child { margin-bottom: 0; }
      .msg.assistant ul, .msg.assistant ol { margin: 4px 0 8px 0; padding-left: 22px; }
      .msg.assistant li { margin: 2px 0; }
      .msg.assistant code {
        background: rgba(0,0,0,0.35);
        padding: 1px 6px;
        border-radius: 4px;
        font-size: 13px;
      }
      .msg.assistant pre {
        background: rgba(0,0,0,0.35);
        padding: 10px 12px;
        border-radius: 8px;
        overflow-x: auto;
        margin: 6px 0;
      }
      .msg.assistant pre code { background: transparent; padding: 0; }
      .msg.assistant h1, .msg.assistant h2, .msg.assistant h3 {
        margin: 10px 0 6px 0;
        font-size: 15px;
      }
      .msg.assistant a { color: var(--accent); }
      form {
        display: flex;
        gap: 10px;
        padding: 12px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
      }
      input[type="text"] {
        flex: 1;
        background: transparent;
        border: 0;
        color: var(--text);
        outline: none;
        font-size: 15px;
      }
      button {
        background: var(--accent);
        color: #0b1020;
        border: 0;
        border-radius: 10px;
        padding: 8px 16px;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: progress; }
    </style>
  </head>
  <body>
    <header>
      <h1>Embr × Foundry chat</h1>
      <div class="header-right">
        <button id="new-chat" class="ghost" type="button" title="Start a new chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
          New chat
        </button>
        <div class="conn" id="conn" title="Foundry connection">
          <span class="dot"></span>
          <span id="conn-text">checking…</span>
        </div>
      </div>
    </header>
    <main>
      <div id="log"></div>
      <form id="form" autocomplete="off">
        <input id="input" type="text" placeholder="Ask me anything…" />
        <button id="send" type="submit">Send</button>
      </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script>
      const log = document.getElementById("log");
      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const send = document.getElementById("send");

      const conn = document.getElementById("conn");
      const connText = document.getElementById("conn-text");
      const newChatBtn = document.getElementById("new-chat");

      newChatBtn.addEventListener("click", async () => {
        log.innerHTML = "";
        input.focus();
        try {
          await fetch("/api/reset", { method: "POST" });
        } catch (e) {
          // non-fatal
        }
      });

      marked.setOptions({ gfm: true, breaks: true });

      function renderMarkdown(text) {
        return DOMPurify.sanitize(marked.parse(text || ""));
      }

      async function loadConfig() {
        try {
          const r = await fetch("/api/config");
          const c = await r.json();
          if (!c.endpoint_configured) {
            conn.classList.add("err");
            connText.textContent = "⚠ Foundry not configured";
            return;
          }
          conn.classList.add("ok");
          const parts = [];
          if (c.host) parts.push(`<span class="label">host</span> <span class="value">${c.host}</span>`);
          if (c.project) parts.push(`<span class="label">project</span> <span class="value">${c.project}</span>`);
          if (c.model) parts.push(`<span class="label">model</span> <span class="value">${c.model}</span>`);
          connText.innerHTML = parts.join(' <span class="sep">·</span> ');
        } catch (e) {
          conn.classList.add("err");
          connText.textContent = "⚠ config error";
        }
      }
      loadConfig();

      const AVATARS = {
        user: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
        assistant: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l1.9 4.6L18.5 8.5l-4.6 1.9L12 15l-1.9-4.6L5.5 8.5l4.6-1.9L12 2z"/><path d="M19 15l.8 2 2 .8-2 .8-.8 2-.8-2-2-.8 2-.8L19 15z"/></svg>',
      };

      function append(role, text) {
        const row = document.createElement("div");
        row.className = `row ${role}`;

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.innerHTML = AVATARS[role] || "";

        const bubble = document.createElement("div");
        bubble.className = `msg ${role}`;
        if (role === "assistant") {
          bubble.innerHTML = renderMarkdown(text);
        } else {
          bubble.textContent = text;
        }

        row.appendChild(avatar);
        row.appendChild(bubble);
        log.appendChild(row);
        log.scrollTop = log.scrollHeight;
        return bubble;
      }

      function setAssistant(el, text) {
        el.innerHTML = renderMarkdown(text);
        log.scrollTop = log.scrollHeight;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const message = input.value.trim();
        if (!message) return;
        append("user", message);
        input.value = "";
        send.disabled = true;
        const pending = append("assistant", "…");
        try {
          const r = await fetch("/api/chat", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ message }),
          });
          if (!r.ok) throw new Error(await r.text());
          const data = await r.json();
          setAssistant(pending, data.reply);
        } catch (err) {
          pending.textContent = `Error: ${err.message || err}`;
        } finally {
          send.disabled = false;
          input.focus();
        }
      });
    </script>
  </body>
</html>
