<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Embr × Foundry chat</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #131a33;
        --border: #27305a;
        --text: #e7ecff;
        --muted: #8892c4;
        --accent: #7aa2ff;
        --user: #1e3a8a;
        --assistant: #1f2947;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(180deg, #070a1a 0%, var(--bg) 100%);
        color: var(--text);
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      header h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: 0.2px; }
      header .badge {
        font-size: 12px;
        color: var(--muted);
        background: var(--panel);
        border: 1px solid var(--border);
        padding: 4px 10px;
        border-radius: 999px;
      }
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: 820px;
        width: 100%;
        margin: 0 auto;
        padding: 24px;
        gap: 16px;
        overflow: hidden;
      }
      #log {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding-right: 4px;
      }
      .msg {
        padding: 12px 16px;
        border-radius: 14px;
        max-width: 80%;
        line-height: 1.45;
        white-space: pre-wrap;
        word-wrap: break-word;
        border: 1px solid var(--border);
      }
      .msg.user { align-self: flex-end; background: var(--user); }
      .msg.assistant { align-self: flex-start; background: var(--assistant); }
      .msg.system { align-self: center; background: transparent; color: var(--muted); font-size: 12px; }
      form {
        display: flex;
        gap: 10px;
        padding: 12px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
      }
      input[type="text"] {
        flex: 1;
        background: transparent;
        border: 0;
        color: var(--text);
        outline: none;
        font-size: 15px;
      }
      button {
        background: var(--accent);
        color: #0b1020;
        border: 0;
        border-radius: 10px;
        padding: 8px 16px;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: progress; }
    </style>
  </head>
  <body>
    <header>
      <h1>Embr × Foundry chat</h1>
      <span class="badge" id="badge">loading…</span>
    </header>
    <main>
      <div id="log">
        <div class="msg system">
          Agent orchestrated locally with Microsoft Agent Framework. LLM served by a Foundry-deployed model.
        </div>
      </div>
      <form id="form" autocomplete="off">
        <input id="input" type="text" placeholder="Ask me about the weather in Seattle, or to roll a d20…" />
        <button id="send" type="submit">Send</button>
      </form>
    </main>
    <script>
      const log = document.getElementById("log");
      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const send = document.getElementById("send");
      const badge = document.getElementById("badge");

      async function loadConfig() {
        try {
          const r = await fetch("/api/config");
          const c = await r.json();
          badge.textContent = c.endpoint_configured
            ? `model: ${c.model}`
            : "⚠ no Foundry endpoint configured";
        } catch (e) {
          badge.textContent = "⚠ config error";
        }
      }
      loadConfig();

      function append(role, text) {
        const el = document.createElement("div");
        el.className = `msg ${role}`;
        el.textContent = text;
        log.appendChild(el);
        log.scrollTop = log.scrollHeight;
        return el;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const message = input.value.trim();
        if (!message) return;
        append("user", message);
        input.value = "";
        send.disabled = true;
        const pending = append("assistant", "…");
        try {
          const r = await fetch("/api/chat", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ message }),
          });
          if (!r.ok) throw new Error(await r.text());
          const data = await r.json();
          pending.textContent = data.reply;
        } catch (err) {
          pending.textContent = `Error: ${err.message || err}`;
        } finally {
          send.disabled = false;
          input.focus();
        }
      });
    </script>
  </body>
</html>
